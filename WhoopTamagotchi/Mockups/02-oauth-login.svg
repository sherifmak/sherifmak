<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>

  <!-- iPhone frame -->
  <rect width="390" height="844" rx="40" fill="url(#bg)"/>

  <!-- Status bar -->
  <text x="30" y="58" font-family="SF Pro, -apple-system, Helvetica" font-size="15" font-weight="600" fill="#1c1c1e">9:41</text>

  <!-- Nav bar -->
  <text x="195" y="105" font-family="SF Pro, -apple-system, Helvetica" font-size="17" font-weight="700" fill="#1c1c1e" text-anchor="middle">Whoop Tamagotchi</text>

  <!-- WHOOP OAuth page mockup -->
  <rect x="20" y="130" width="350" height="580" rx="12" fill="white" stroke="#e0e0e0"/>

  <!-- WHOOP logo area -->
  <rect x="20" y="130" width="350" height="60" rx="12" fill="#1c1c1e"/>
  <rect x="20" y="170" width="350" height="20" fill="#1c1c1e"/>
  <text x="195" y="168" font-family="SF Pro, -apple-system, Helvetica" font-size="20" font-weight="700" fill="white" text-anchor="middle">WHOOP</text>

  <!-- Sign in form -->
  <text x="195" y="230" font-family="SF Pro, -apple-system, Helvetica" font-size="16" font-weight="600" fill="#1c1c1e" text-anchor="middle">Sign in to your account</text>

  <text x="50" y="275" font-family="SF Pro, -apple-system, Helvetica" font-size="13" fill="#8e8e93">Email</text>
  <rect x="40" y="285" width="310" height="44" rx="8" fill="white" stroke="#d1d1d6"/>
  <text x="55" y="312" font-family="SF Pro, -apple-system, Helvetica" font-size="15" fill="#c7c7cc">you@email.com</text>

  <text x="50" y="355" font-family="SF Pro, -apple-system, Helvetica" font-size="13" fill="#8e8e93">Password</text>
  <rect x="40" y="365" width="310" height="44" rx="8" fill="white" stroke="#d1d1d6"/>
  <text x="55" y="392" font-family="SF Pro, -apple-system, Helvetica" font-size="15" fill="#c7c7cc">••••••••</text>

  <!-- Sign in button -->
  <rect x="40" y="435" width="310" height="48" rx="10" fill="#1c1c1e"/>
  <text x="195" y="465" font-family="SF Pro, -apple-system, Helvetica" font-size="16" font-weight="600" fill="white" text-anchor="middle">Sign In</text>

  <!-- Permission text -->
  <rect x="40" y="510" width="310" height="80" rx="8" fill="#f0f0f5"/>
  <text x="195" y="535" font-family="SF Pro, -apple-system, Helvetica" font-size="12" fill="#8e8e93" text-anchor="middle">Whoop Tamagotchi is requesting access to:</text>
  <text x="195" y="555" font-family="SF Pro, -apple-system, Helvetica" font-size="13" font-weight="500" fill="#1c1c1e" text-anchor="middle">✓ Read your daily cycle &amp; strain data</text>
  <text x="195" y="575" font-family="SF Pro, -apple-system, Helvetica" font-size="13" font-weight="500" fill="#1c1c1e" text-anchor="middle">✓ Stay connected (offline access)</text>

  <!-- Step indicator -->
  <text x="195" y="750" font-family="SF Pro, -apple-system, Helvetica" font-size="12" fill="#c7c7cc" text-anchor="middle">STEP 2: WHOOP OAUTH LOGIN</text>

  <!-- Home indicator -->
  <rect x="145" y="818" width="100" height="5" rx="2.5" fill="#1c1c1e" opacity="0.3"/>
</svg>
