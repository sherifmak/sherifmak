<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e9ecef"/>
    </linearGradient>
  </defs>

  <!-- iPhone frame -->
  <rect width="390" height="844" rx="40" fill="url(#bg)"/>
  <text x="30" y="58" font-family="SF Pro, -apple-system, Helvetica" font-size="15" font-weight="600" fill="#1c1c1e">9:41</text>
  <text x="195" y="105" font-family="SF Pro, -apple-system, Helvetica" font-size="17" font-weight="700" fill="#1c1c1e" text-anchor="middle">Whoop Tamagotchi</text>

  <!-- Tamagotchi - RESTING (strain 2.1) -->
  <g transform="translate(195, 250)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="70" ry="60" fill="#8cbff3"/>
    <ellipse cx="0" cy="0" rx="70" ry="60" fill="none" stroke="#6fa8e8" stroke-width="2"/>

    <!-- Zzz -->
    <text x="50" y="-40" font-family="SF Pro, -apple-system, Helvetica" font-size="10" font-weight="700" fill="#6fa8e8" opacity="0.6">z</text>
    <text x="56" y="-52" font-family="SF Pro, -apple-system, Helvetica" font-size="13" font-weight="700" fill="#6fa8e8" opacity="0.6">z</text>
    <text x="62" y="-66" font-family="SF Pro, -apple-system, Helvetica" font-size="16" font-weight="700" fill="#6fa8e8" opacity="0.6">Z</text>

    <!-- Closed eyes -->
    <line x1="-24" y1="-6" x2="-8" y2="-6" stroke="#1c1c1e" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="-6" x2="24" y2="-6" stroke="#1c1c1e" stroke-width="3" stroke-linecap="round"/>

    <!-- Flat mouth -->
    <line x1="-8" y1="14" x2="8" y2="14" stroke="#1c1c1e" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Strain display -->
  <text x="195" y="370" font-family="SF Pro, -apple-system, Helvetica" font-size="15" font-weight="500" fill="#8e8e93" text-anchor="middle">Today's Strain</text>
  <text x="195" y="430" font-family="SF Pro, -apple-system, Helvetica" font-size="56" font-weight="700" fill="#1c1c1e" text-anchor="middle">2.1</text>
  <text x="195" y="460" font-family="SF Pro, -apple-system, Helvetica" font-size="18" fill="#8cbff3" text-anchor="middle">Chilling</text>

  <!-- Strain bar -->
  <rect x="80" y="485" width="230" height="8" rx="4" fill="#e9ecef"/>
  <rect x="80" y="485" width="23" height="8" rx="4" fill="#8cbff3"/>
  <text x="195" y="510" font-family="SF Pro, -apple-system, Helvetica" font-size="11" fill="#8e8e93" text-anchor="middle">2.1 / 21</text>

  <!-- Refresh button -->
  <rect x="135" y="545" width="120" height="40" rx="10" fill="#007AFF"/>
  <text x="195" y="571" font-family="SF Pro, -apple-system, Helvetica" font-size="15" font-weight="600" fill="white" text-anchor="middle">Refresh</text>

  <!-- Sign out -->
  <text x="195" y="750" font-family="SF Pro, -apple-system, Helvetica" font-size="13" fill="#FF3B30" text-anchor="middle">Sign Out</text>

  <!-- Label -->
  <text x="195" y="800" font-family="SF Pro, -apple-system, Helvetica" font-size="12" fill="#c7c7cc" text-anchor="middle">RESTING STATE — Strain 0-4</text>

  <rect x="145" y="818" width="100" height="5" rx="2.5" fill="#1c1c1e" opacity="0.3"/>
</svg>
